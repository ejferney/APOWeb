                        <Route path="/directory" element={<Directory />} />
                        <Route path="/heatmap" element={<AvailabilityHeatmap />} />
                        <Route path="/paint-availability" element={<PaintAvailability />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
