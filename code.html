                                            onClick={() => isCurrentMonth && setSelectedDay(day)}
                                            className={`bg-white dark:bg-card-dark min-h-[100px] p-3 hover:bg-white/5 cursor-pointer relative transition-colors ${day === selectedDay ? 'ring-2 ring-primary ring-inset z-10 bg-primary/5' : ''} ${!isCurrentMonth ? 'opacity-20 pointer-events-none' : ''}`}
                                        >
                                            <span className={`text-xs font-black ${day === selectedDay ? 'text-primary' : 'text-slate-500 dark:text-slate-400'}`}>
                                                {isCurrentMonth ? day : ''}
                                            </span>
                                            <div className="mt-2 space-y-1">
                                                {day === 2 && <CalendarEvent label="7:00 PM Exec" color="#fbbf24" />}
                                                {day === 4 && <CalendarEvent label="6:30 PM Pizza" color="#10b981" />}
                                                {day === 12 && <CalendarEvent label="3:00 PM Tutoring" color="#ec5b13" />}
                                                {day === 14 && <CalendarEvent label="9:00 AM Park" color="#ec5b13" active={true} />}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>

                    {drawerOpen && (
                        <aside className="w-[420px] flex-shrink-0 bg-white dark:bg-card-dark border-l border-border-dark flex flex-col shadow-2xl relative z-20 overflow-hidden">
                            <button onClick={() => setDrawerOpen(false)} className="absolute top-4 right-4 z-10 p-2 bg-black/40 backdrop-blur-md rounded-lg text-white hover:bg-black transition-colors shadow-lg"><span className="material-symbols-outlined text-[18px]">close</span></button>
                            <div className="h-56 w-full bg-cover bg-center relative" style={{backgroundImage: "url('https://images.unsplash.com/photo-1593113598332-cd288d649433?auto=format&fit=crop&q=80&w=800')"}}>
                                <div className="absolute inset-0 bg-gradient-to-t from-card-dark via-card-dark/20 to-transparent"></div>
                                <div className="absolute bottom-6 left-8">
                                    <span className="inline-flex items-center px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest bg-primary text-white mb-2 shadow-lg">Community Service</span>
                                    <h2 className="text-2xl font-black text-white leading-tight uppercase tracking-tight">Community Park Cleanup</h2>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-8 flex flex-col gap-8">
                                <div className="grid grid-cols-1 gap-6">
                                    <CalendarMeta icon="schedule" title="Sat, Oct 14" sub="9:00 AM - 12:00 PM" />
                                    <CalendarMeta icon="location_on" title="Centennial Park" sub="2500 West End Ave, Nashville" />
                                </div>
                                <div className="h-px bg-border-dark"></div>
                                <div className="flex flex-col gap-3">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-primary">Briefing</h3>
                                    <p className="text-sm text-slate-600 dark:text-text-secondary leading-relaxed font-medium">Join us for our monthly community service event! We'll be partnering with the Parks Department to clean up litter and plant new flowers.</p>
                                </div>
                                <div className="flex flex-col gap-4">
                                    <div className="flex items-center justify-between">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-primary">Personnel</h3>
                                        <span className="text-[10px] font-black px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-500 uppercase tracking-widest">15 / 20 Registered</span>
                                    </div>
                                    <div className="flex -space-x-2 overflow-hidden">
                                        {[1,2,3,4,5,6].map(i => (
                                            <img key={i} className="inline-block h-8 w-8 rounded-lg ring-2 ring-white dark:ring-card-dark" src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${i}`} />
                                        ))}
                                        <div className="flex items-center justify-center h-8 w-8 rounded-lg bg-border-dark text-[10px] font-black">+9</div>
                                    </div>
                                </div>
                            </div>
                            <div className="p-8 border-t border-border-dark bg-white dark:bg-card-dark">
                                <button className="w-full bg-primary hover:bg-primary-hover text-white font-black uppercase tracking-widest text-xs py-4 rounded-xl shadow-xl shadow-primary/25 transition-all">Register Attendance</button>
                            </div>
                        </aside>
                    )}
                </div>
            );
        };

        const CalendarEvent = ({ label, color, active }) => (
            <div className={`flex items-center gap-1.5 px-2 py-1 rounded-md text-[9px] font-black uppercase tracking-tighter truncate border ${active ? 'bg-primary text-white border-primary shadow-lg shadow-primary/20' : 'bg-transparent text-slate-400 border-border-dark'}`}>
                <div className="size-1 rounded-full shrink-0" style={{backgroundColor: active ? 'white' : color}}></div>
                {label}
            </div>
        );

        const CalendarMeta = ({ icon, title, sub }) => (
            <div className="flex items-start gap-4">
                <div className="flex items-center justify-center w-10 h-10 rounded-xl bg-background-light dark:bg-background-dark text-primary shrink-0 border border-border-dark">
                    <span className="material-symbols-outlined text-[18px]">{icon}</span>
                </div>
                <div>
                    <p className="text-sm font-black uppercase tracking-tight">{title}</p>
                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{sub}</p>
                </div>
            </div>
        );

        // --- App Shell ---

        const App = () => {
            const [isOfficer, setIsOfficer] = useState(false);

            return (
                <MemoryRouter initialEntries={['/']}>
                    <div className="fixed bottom-4 right-4 z-50 flex items-center gap-2 bg-white dark:bg-card-dark p-2 rounded-lg border border-border-dark shadow-2xl">
                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-500 px-2">Role Toggle (Dev)</span>
                        <button 
                            onClick={() => setIsOfficer(!isOfficer)}
                            className={`px-3 py-1.5 rounded text-[10px] font-black uppercase tracking-widest transition-all ${isOfficer ? 'bg-primary text-white' : 'bg-slate-200 dark:bg-background-dark text-slate-500'}`}
                        >
                            {isOfficer ? 'Officer' : 'Member'}
                        </button>
                    </div>
                    <Routes>
                        <Route path="/" element={<DashboardPage isOfficer={isOfficer} />} />
                        <Route path="/calendar" element={<CalendarPage isOfficer={isOfficer} />} />
                        <Route path="/service-log" element={<ServiceLogPage isOfficer={isOfficer} />} />
                        <Route path="/directory" element={<DirectoryPage isOfficer={isOfficer} />} />
                        <Route path="/officer" element={isOfficer ? <OfficerDashboardPage /> : <DashboardPage isOfficer={isOfficer} />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
